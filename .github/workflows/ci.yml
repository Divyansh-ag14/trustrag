name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + migrate + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trustrag
          POSTGRES_PASSWORD: trustrag_dev
          POSTGRES_DB: trustrag
        # Map to 5435 so the repo's default DATABASE_URL / alembic.ini work unchanged
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U trustrag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Defaults already point at localhost:5435; only the secrets need supplying.
      CONNECTOR_ENCRYPTION_KEY: JPO6i5_jSs_kZHqxTZO_oM_qsWiRTKvdd-58V5A-X8U=
      JWT_SECRET: ci-test-secret
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Non-blocking for now — pre-existing eslint debt (setState-in-effect,
      # unused vars). Build below is the hard gate (it type-checks).
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
